name: ToToRo Microservices CI/CD

on:
  push:
    branches: [ main, master, dev, 'feature/**' ]
  pull_request:
    branches: [ main, master ]

env:
  GCP_PROJECT: totoro-microservices-prod
  GAR_LOCATION: asia-southeast1
  GAR_REPO: totoro-repo
  CLOUD_RUN_REGION: asia-southeast1

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ============================================================
  # JOB 1: Build & Test (runs on all branches)
  # ============================================================
  build-and-test:
    name: Build and Test Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Install Common Library
        run: mvn clean install -pl common -am

      - name: Build and Test All Modules
        run: mvn clean install

  # ============================================================
  # JOB 2: Build Docker → Push to GAR (only on main/master/dev)
  # ============================================================
  build-and-push-docker:
    name: Build & Push Docker Image to GAR
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ identity-service, core-service, social-service, gateway-service ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR for Service
        run: mvn clean package -pl ${{ matrix.service }} -am -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image to GAR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/${{ matrix.service }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: Security Scanning with Trivy (only on main/master)
  # ============================================================
  security-scan:
    name: Security Scan Docker Images
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ identity-service, core-service, social-service, gateway-service ]

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/${{ matrix.service }}:latest'
          format: 'table'
          exit-code: '0'          # Log only, do not fail the build
          ignore-unfixed: true    # Ignore CVEs without patch
          severity: 'CRITICAL,HIGH'

  # ============================================================
  # JOB 4: Deploy to Cloud Run (only on main/master)
  # ============================================================
  deploy-cloud-run:
    name: Deploy to GCP Cloud Run
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy identity-service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: identity-service
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/identity-service:${{ github.sha }}
          region: ${{ env.CLOUD_RUN_REGION }}
          env_vars: |
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            OAUTH2_REDIRECT_URI=https://gateway-service-628694485991.asia-southeast1.run.app/login/oauth2/code/google
            FRONTEND_OAUTH2_REDIRECT_URL=https://se361-totoro-fe.vercel.app/oauth2/redirect

      - name: Deploy core-service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: core-service
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/core-service:${{ github.sha }}
          region: ${{ env.CLOUD_RUN_REGION }}
          env_vars: |
            SPRING_CACHE_TYPE=redis
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_AUTOCONFIG_EXCLUDE=none
            CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}

      - name: Deploy social-service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: social-service
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/social-service:${{ github.sha }}
          region: ${{ env.CLOUD_RUN_REGION }}

      - name: Deploy gateway-service to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: gateway-service
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GAR_REPO }}/gateway-service:${{ github.sha }}
          region: ${{ env.CLOUD_RUN_REGION }}
