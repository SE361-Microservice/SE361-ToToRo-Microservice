# ============================================================
# ToToRo K8s Secrets Template
# ============================================================
# DO NOT commit actual secret values — use this as a template.
# Create the secret manually before deploying:
#
#   kubectl create namespace totoro
#   kubectl create secret generic totoro-secrets \
#     --namespace=totoro \
#     --from-literal=jwt-secret="<your-jwt-secret-base64>" \
#     --from-literal=google-client-id="<google-oauth-client-id>" \
#     --from-literal=google-client-secret="<google-oauth-client-secret>" \
#     --from-literal=mail-username="<smtp-email>" \
#     --from-literal=mail-password="<smtp-app-password>"
#
# Or apply this file after filling in the values:
#
# NOTE: values here must be base64-encoded.
#   echo -n "myvalue" | base64
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: totoro-secrets
  namespace: totoro
type: Opaque
data:
  # base64-encode your actual values before setting them here
  jwt-secret: ""              # echo -n "your-jwt-secret" | base64
  google-client-id: ""        # echo -n "your-google-client-id" | base64
  google-client-secret: ""    # echo -n "your-google-client-secret" | base64
  mail-username: ""           # echo -n "your-email@gmail.com" | base64
  mail-password: ""           # echo -n "your-app-password" | base64
