apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: totoro
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: totoro/identity-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: identity-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: totoro-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: totoro-secrets
                  key: google-client-id
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: totoro-secrets
                  key: google-client-secret
                  optional: true
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: totoro-secrets
                  key: mail-username
                  optional: true
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: totoro-secrets
                  key: mail-password
                  optional: true
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
