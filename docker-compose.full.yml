version: '3.8'

services:
  # =========================================================
  # 1. DATABASE INFRASTRUCTURE
  # =========================================================
  identity-db:
    image: postgres:15-alpine
    container_name: totoro-identity-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  core-db:
    image: postgres:15-alpine
    container_name: totoro-core-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_db
    ports:
      - "5434:5432"
    volumes:
      - core_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  social-db:
    image: postgres:15-alpine
    container_name: totoro-social-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_db
    ports:
      - "5435:5432"
    volumes:
      - social_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  # =========================================================
  # 2. EVENT STREAMING INFRASTRUCTURE
  # =========================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: totoro-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:29092
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9644:9644"
    networks:
      - totoro-network
    restart: unless-stopped

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: totoro-redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
    networks:
      - totoro-network
    restart: unless-stopped

  # =========================================================
  # 3. MICROSERVICES (Optional - can run locally via IDE)
  # =========================================================
  # To run services in docker, uncomment the following:
  
  # core-service:
  #   build: ./core-service
  #   container_name: totoro-core-service
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://core-db:5432/core_db
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=password
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
  #     - IDENTITY_SERVICE_URL=http://identity-service:8081
  #   depends_on:
  #     - core-db
  #     - redpanda
  #   networks:
  #     - totoro-network

  # social-service:
  #   build: ./social-service
  #   container_name: totoro-social-service
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://social-db:5432/social_db
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=password
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
  #   depends_on:
  #     - social-db
  #     - redpanda
  #   networks:
  #     - totoro-network

networks:
  totoro-network:
    driver: bridge

volumes:
  identity_db_data:
  core_db_data:
  social_db_data:
