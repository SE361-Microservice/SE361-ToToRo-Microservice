version: '3.8'

services:
  # =========================================================
  # 1. DATABASE INFRASTRUCTURE
  # =========================================================
  identity-db:
    image: postgres:15-alpine
    container_name: totoro-identity-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: identity_db
    ports:
      - "5433:5432"
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  core-db:
    image: postgres:15-alpine
    container_name: totoro-core-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: core_db
    ports:
      - "5434:5432"
    volumes:
      - core_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  social-db:
    image: postgres:15-alpine
    container_name: totoro-social-db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: social_db
    ports:
      - "5435:5432"
    volumes:
      - social_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network
    restart: unless-stopped

  # =========================================================
  # 2. EVENT STREAMING INFRASTRUCTURE
  # =========================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: totoro-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - totoro-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: totoro-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - totoro-network

  # =========================================================
  # 3. MICROSERVICES (Optional - can run locally via IDE)
  # =========================================================
  # To run services in docker, uncomment the following:
  
  # core-service:
  #   build: ./core-service
  #   container_name: totoro-core-service
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://core-db:5432/core_db
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=password
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
  #     - IDENTITY_SERVICE_URL=http://identity-service:8081
  #   depends_on:
  #     - core-db
  #     - kafka
  #   networks:
  #     - totoro-network

  # social-service:
  #   build: ./social-service
  #   container_name: totoro-social-service
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:postgresql://social-db:5432/social_db
  #     - SPRING_DATASOURCE_USERNAME=root
  #     - SPRING_DATASOURCE_PASSWORD=password
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
  #   depends_on:
  #     - social-db
  #     - kafka
  #   networks:
  #     - totoro-network

networks:
  totoro-network:
    driver: bridge

volumes:
  identity_db_data:
  core_db_data:
  social_db_data:
