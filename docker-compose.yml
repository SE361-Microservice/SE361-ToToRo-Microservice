version: '3.8'

services:
  # ======= DATABASES =======
  identity-db:
    image: postgres:16-alpine
    container_name: totoro-identity-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - identity_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network

  core-db:
    image: postgres:16-alpine
    container_name: totoro-core-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - core_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network

  social-db:
    image: postgres:16-alpine
    container_name: totoro-social-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: social_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    volumes:
      - social_db_data:/var/lib/postgresql/data
    networks:
      - totoro-network

  # ======= MESSAGE BROKER (Redpanda — Kafka-compatible) =======
  # Note: spring-kafka client works with Redpanda via the Kafka Wire Protocol.
  # Use SPRING_KAFKA_BOOTSTRAP_SERVERS=redpanda:9092 (internal) or localhost:29092 (external)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: totoro-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:29092
    ports:
      - "9092:9092"   # internal (Docker network)
      - "29092:29092" # external (host → localhost:29092)
    networks:
      - totoro-network

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.3.1
    container_name: totoro-redpanda-console
    ports:
      - "8088:8080" # Redpanda Console UI
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      - redpanda
    networks:
      - totoro-network

  # ======= OBSERVABILITY & TRACING =======
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: totoro-jaeger
    ports:
      - "16686:16686" # Jaeger Web UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - totoro-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: totoro-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - totoro-network

  grafana:
    image: grafana/grafana:10.0.3
    container_name: totoro-grafana
    ports:
      - "3001:3000" # 3000 may be used by frontend dev server
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - totoro-network

volumes:
  identity_db_data:
  core_db_data:
  social_db_data:
  grafana_data:

networks:
  totoro-network:
    driver: bridge
