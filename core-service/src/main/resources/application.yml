server:
  port: 8082

spring:
  application:
    name: core-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/core_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none # Managed by Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  # Internal API key for service-to-service auth (AI Service <-> Backend)
  internal-api-key: ${INTERNAL_API_KEY:}

identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Core Service API
    description: API cho các nghiệp vụ cốt lõi - Phòng trọ, Đánh giá, Báo cáo
    version: 1.0.0


management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,info
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      userServiceCB:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
    instances:
      userServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
    instances:
      userServiceCB:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
    instances:
      userServiceCB:
        baseConfig: default
