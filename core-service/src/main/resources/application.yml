server:
  port: ${PORT:${SERVER_PORT:8082}}
  forward-headers-strategy: native

spring:
  application:
    name: core-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:true}

  cache:
    type: ${SPRING_CACHE_TYPE:simple}  # 'simple' = in-memory (no Redis needed), 'redis' when Redis available
    redis:
      time-to-live: 300000 # 5 minutes
      cache-null-values: false

  autoconfigure:
    exclude:
      - ${REDIS_AUTOCONFIG_EXCLUDE:org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/core_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none # Managed by Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  # Internal API key for service-to-service auth (AI Service <-> Backend)
  internal-api-key: ${INTERNAL_API_KEY:}

identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}

ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}

# Cloudinary (image CDN)
# Set CLOUDINARY_URL env var (format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME)
# or configure individual properties below
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: Core Service API
    description: API cho các nghiệp vụ cốt lõi - Phòng trọ, Đánh giá, Báo cáo
    version: 1.0.0


management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,prometheus,metrics
  endpoint:
    health:
      show-details: always
  # Pillar 2: Metrics — Prometheus scrapes /actuator/prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  # Pillar 3: Distributed Tracing — OTLP → Jaeger
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; lower in prod
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

# Pillar 1: Structured Logging — trace/span IDs injected by Micrometer Tracing
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      userServiceCB:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
    instances:
      userServiceCB:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
    instances:
      userServiceCB:
        baseConfig: default
  bulkhead:
    configs:
      default:
        maxConcurrentCalls: 20
    instances:
      userServiceCB:
        baseConfig: default
