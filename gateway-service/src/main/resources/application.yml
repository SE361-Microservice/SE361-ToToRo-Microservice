server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${ALLOWED_ORIGIN:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - JwtAuthenticationFilter

        - id: core-service
          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/listings/**, /api/locations/**
          filters:
            - JwtAuthenticationFilter

        - id: social-service
          uri: ${SOCIAL_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/chat/**, /api/matching/**, /api/community/**, /api/notifications/**, /api/reviews/**, /api/reports/**, /api/admin/reports/**
          filters:
            - JwtAuthenticationFilter

        - id: social-service-ws
          uri: ${SOCIAL_SERVICE_WS_URL:ws://localhost:8083}
          predicates:
            - Path=/ws/**
          filters:
            - JwtAuthenticationFilter

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
